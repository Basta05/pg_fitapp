<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pg_fit — Katalog cviků</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<div id="sidebarMount"></div>

<main class="main-content">
  <div id="alertContainer"></div>

  <div class="page-header">
    <h2 class="mb-0">Katalog cviků</h2>
  </div>

  <!-- Filters -->
  <div class="d-flex flex-wrap gap-2 mb-4">
    <button class="btn btn-primary filter-btn active" data-group="">Vše</button>
    <button class="btn btn-outline-primary filter-btn" data-group="chest">Hrudník</button>
    <button class="btn btn-outline-primary filter-btn" data-group="back">Záda</button>
    <button class="btn btn-outline-primary filter-btn" data-group="shoulders">Ramena</button>
    <button class="btn btn-outline-primary filter-btn" data-group="biceps">Biceps</button>
    <button class="btn btn-outline-primary filter-btn" data-group="triceps">Triceps</button>
    <button class="btn btn-outline-primary filter-btn" data-group="legs">Nohy</button>
    <button class="btn btn-outline-primary filter-btn" data-group="glutes">Hýždě</button>
    <button class="btn btn-outline-primary filter-btn" data-group="abs">Břicho</button>
    <button class="btn btn-outline-primary filter-btn" data-group="cardio">Kardio</button>
    <button class="btn btn-outline-primary filter-btn" data-group="full_body">Celé tělo</button>
  </div>

  <div class="row g-3" id="catalogGrid">
    <p class="text-muted">Načítání...</p>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="text/javascript" src="/eel.js"></script>
<script src="assets/app.js"></script>
<script src="assets/workouts.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', initCatalogPage);
</script>
</body>
</html>
