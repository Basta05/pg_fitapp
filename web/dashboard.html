<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>pg_fit — Přehled</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/style.css" />
</head>
<body>
<div id="sidebarMount"></div>

<main class="main-content">
  <div id="alertContainer"></div>

  <div class="page-header">
    <div>
      <h2 class="mb-0">Přehled</h2>
      <p class="text-muted mb-0" id="todayDate"></p>
    </div>
    <a href="workouts.html?new=1" class="btn btn-primary">
      <i class="bi bi-plus-circle"></i> Nový trénink
    </a>
  </div>

  <!-- Stat cards -->
  <div class="row g-3 mb-4">
    <div class="col-md-3 col-6">
      <div class="stat-card">
        <div class="stat-label"><i class="bi bi-lightning"></i> Celkem tréninků</div>
        <div class="stat-value" id="totalWorkouts">—</div>
      </div>
    </div>
    <div class="col-md-3 col-6">
      <div class="stat-card">
        <div class="stat-label"><i class="bi bi-calendar-week"></i> Tento týden</div>
        <div class="stat-value" id="thisWeek">—</div>
      </div>
    </div>
    <div class="col-md-3 col-6">
      <div class="stat-card">
        <div class="stat-label"><i class="bi bi-person-arms-up"></i> Aktuální váha</div>
        <div class="stat-value" id="latestWeight">—</div>
        <div class="stat-label" id="latestWeightUnit"></div>
      </div>
    </div>
    <div class="col-md-3 col-6">
      <div class="stat-card">
        <div class="stat-label"><i class="bi bi-trophy"></i> Rychlé akce</div>
        <div class="d-flex flex-column gap-2 mt-2">
          <a href="food_log_add.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-egg-fried"></i> Přidat jídlo</a>
          <a href="body_metrics_form.html" class="btn btn-outline-primary btn-sm"><i class="bi bi-graph-up"></i> Přidat míry</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Recent workouts -->
  <div class="stat-card">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h5 class="mb-0">Poslední tréninky</h5>
      <a href="workouts.html" class="btn btn-outline-primary btn-sm">Zobrazit vše</a>
    </div>
    <div id="recentWorkouts">
      <p class="text-muted">Načítání...</p>
    </div>
  </div>
</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script type="text/javascript" src="/eel.js"></script>
<script src="assets/app.js"></script>
<script>
  document.getElementById('todayDate').textContent = new Date().toLocaleDateString('cs-CZ', {weekday:'long', year:'numeric', month:'long', day:'numeric'});

  async function loadDashboard() {
    const stats = await eel.get_dashboard_stats()();
    document.getElementById('totalWorkouts').textContent = stats.total_workouts;
    document.getElementById('thisWeek').textContent = stats.this_week;
    if (stats.latest_weight) {
      document.getElementById('latestWeight').textContent = stats.latest_weight;
      document.getElementById('latestWeightUnit').textContent = 'kg';
    } else {
      document.getElementById('latestWeight').textContent = '—';
    }

    const container = document.getElementById('recentWorkouts');
    if (!stats.recent_workouts.length) {
      container.innerHTML = `<div class="empty-state"><i class="bi bi-lightning"></i><p>Zatím žádné tréninky.</p></div>`;
      return;
    }
    container.innerHTML = stats.recent_workouts.map(w => `
      <div class="d-flex justify-content-between align-items-center py-2 border-bottom">
        <div>
          <a href="workout_detail.html?id=${w.id}" class="fw-semibold text-decoration-none text-dark">${w.name}</a>
          <div class="text-muted small">
            <i class="bi bi-calendar3"></i> ${formatDate(w.date)}
            <span class="ms-2"><i class="bi bi-activity"></i> ${(w.exercises||[]).length} cviků</span>
          </div>
        </div>
        <a href="workout_detail.html?id=${w.id}" class="btn btn-outline-primary btn-sm"><i class="bi bi-arrow-right"></i></a>
      </div>`).join('');
  }

  document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
